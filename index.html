טל את החוזה.", "הסברתי שהנאצים ניצלו זאת בתעמולה.", "חיברתי לתוצאה: התחזקות הנאצים, מדיניות תוקפנית או מלחמה."], "model": "חוזה ורסאי, שנחתם לאחר מלחמת העולם הראשונה, הטיל על גרמניה אשמה, פיצויים כבדים, הגבלות צבאיות ואובדן שטחים. גרמנים רבים ראו בו חוזה משפיל שפגע בכבוד הלאומי, ולכן נוצרו כעס ורצון לנקמה. הנאצים ניצלו את התחושות האלה בתעמולה והבטיחו לבטל את החוזה ולהחזיר לגרמניה כוח וכבוד. לכן חוזה ורסאי תרם להתחזקות הנאצים ולמדיניות התוקפנית שהובילה למלחמה."}, {"id": "crisis", "topic": "המשבר הכלכלי", "q": "הסבירי כיצד המשבר הכלכלי של 1929 סייע להתחזקות הנאצים בגרמניה.", "checks": ["כתבתי שהמשבר הכלכלי החל בשנת 1929 או היה משבר עולמי.", "ציינתי שהמשבר פגע קשה בגרמניה.", "כתבתי על אבטלה, עוני, סגירת עסקים או ייאוש.", "הסברתי שהציבור איבד אמון בדמוקרטיה או בממשלה.", "כתבתי שאנשים חיפשו מנהיג חזק ופתרונות מהירים.", "הסברתי שהנאצים ניצלו את המצב והבטיחו עבודה, סדר, יציבות או כבוד לאומי."], "model": "המשבר הכלכלי של 1929 פגע קשה בגרמניה וגרם לאבטלה, עוני, סגירת עסקים וייאוש. במצב כזה הציבור איבד אמון בממשלה הדמוקרטית וחיפש פתרונות מהירים ומנהיג חזק. הנאצים ניצלו את המצוקה והבטיחו עבודה, סדר, יציבות והחזרת הכבוד הלאומי. לכן המשבר הכלכלי סייע להתחזקות הנאצים."}, {"id": "anti", "topic": "השוואה אנטישמיות", "q": "השווי בין אנטישמיות מסורתית לבין אנטישמיות מודרנית־נאצית.", "checks": ["כתבתי שבשני הסוגים קיימת שנאה או עוינות כלפי יהודים.", "כתבתי שאנטישמיות מסורתית הייתה בעיקר דתית.", "כתבתי שבאנטישמיות מסורתית המרת דת יכלה לכאורה לשנות את היחס ליהודי.", "כתבתי שאנטישמיות נאצית הייתה גזעית־ביולוגית.", "כתבתי שלפי הנאצים גם המרת דת לא שינתה את המוצא היהודי.", "השתמשתי במילים דת, גזע, דם, ביולוגיה או מוצא."], "model": "בשני הסוגים קיימת שנאה כלפי יהודים, אך הבסיס שונה. אנטישמיות מסורתית הייתה בעיקר דתית: יהודים נרדפו כי לא היו נוצרים, ולכן המרת דת יכלה לכאורה לשנות את היחס אליהם. לעומת זאת, אנטישמיות מודרנית־נאצית הייתה גזענית־ביולוגית: היהודים הוגדרו כגזע מסוכן, ולכן לפי הנאצים גם יהודי שהתנצר נשאר יהודי. לכן ההבדל המרכזי הוא דת מול גזע ודם."}, {"id": "race", "topic": "תורת ה function normalizeState(raw){let d=defaultState();let s=raw&&typeof raw==='object'?raw:{};
  d={...d,...s};d.cards={...defaultState().cards,...(s.cards||{})};d.cards.known=d.cards.known||{};d.cards.again=d.cards.again||{};
  d.practice={...defaultState().practice,...(s.practice||s.p||{})};d.practice.by={...byDefault(),...(d.practice.by||{})};d.practice.wrong=Array.isArray(d.practice.wrong)?d.practice.wrong:[];d.practice.index=clamp(+d.practice.index||+s.qi||0,0,DATA.closedQuestions.length-1);
  d.open={...defaultState().open,...(s.open||{})};d.open.by={...byDefault(),...(d.open.by||{})};d.open.drafts=d.open.drafts||{};d.open.index=clamp(+d.open.index||+s.oi||0,0,DATA.openQuestions.length-1);
  d.weak=d.weak||{};
  d.exam={...defaultState().exam,...(s.exam&&Array.isArray(s.exam)?{history:s.exam,last:s.exam[s.exam.length-1]||null}:s.exam||{})};d.exam.history=Array.isArray(d.exam.history)?d.exam.history:[];d.exam.set=Array.isArray(d.exam.set)?d.exam.set:[];
  d.ui={...defaultState().ui,...(s.ui||{})};d.audio={...defaultState().audio,...(s.audio||{})};d.audio.listened=d.audio.listened||{};d.audio.progress=d.audio.progress||{};d.view=s.view&&NAV.some(n=>n[0]===s.view)?s.view:'home';return d;}
function load(){let raw=storageGet(KEY);if(!raw){for(const k of LEGACY_KEYS){raw=storageGet(k);if(raw)break}}try{state=normalizeState(raw?JSON.parse(raw):null)}catch(e){state=defaultState()}applyUi();}
function save(){state.version=APP_VERSION;storageSet(KEY,JSON.stringify(state));updateProgressMini();}
function clamp(n,min,max){return Math.max(min,Math.min(max,n));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),2200)}
function navHtml(){return NAV.map(([id,ic,label])=>`<button data-view="${id}" onclick="showView('${id}')"><span class="ic">${ic}</span>${label}</button>`).join('')}
function renderNav(){document.getElementById('bottomNav').innerHTML=navHtml();document.getElementById('desktopNav').innerHTML=navHtml();}
function setActiveNav(id){document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===id));}
function showView(id){if(!NAV.some(n=>n[0]===id))id='home';document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));setActiveNav(id);state.view=id;state.lastAction={type:'view',id,time:Date.now()};save();window.scrollTo({top:0,behavior:'smooth'});if(id==='progress')renderProgress();}
function sectionHead(icon,title,desc,extra=''){return `<div class="pageTitle"><div><h2>${icon} ${esc(title)}</h2>${desc?`<p>${esc(desc)}</p>`:''}</div>${extra}</div>`}
function completionPct(){const known=Object.keys(state.cards.known||{}).length/DATA.cards.length;const prac=state.practice.ans?state.practice.ok/state.practice.ans:0;const open=state.open.totalChecks?state.open.checked/state.open.totalChecks:0;return Math.round(((known+prac+open)/3)*100)}
function updateProgressMini(){document.getElementById('miniPct').textContent=completionPct()+'%'}
function renderHome(){const weakNames=Object.keys(state.weak||{}).map(id=>topicById(id)).filter(Boolean).slice(0,4);document.getElementById('home').innerHTML=`
  <header class="hero"><div class="badges"><span class="badge">HTML5</span><span class="badge orange">PWA</span><span class="badge">RTL עברית</span></div><h1 style="font-size:clamp(2rem,7vw,3.6rem);letter-spacing:-.04em;margin-top:12px">מתרגלים היסטוריה — כיתה ט׳</h1><p>גרסה משודרגת: מסכים ברורים, תרגול חכם, כרטיסיות, מבחן, מעקב התקדמות וחזרה לפי טעויות — עם כל התוכן המקורי.</p><div class="btns"><button class="btn primary" onclick="continueLearning()">▶️ המשך מאיפה שעצרתי</button><button class="btn secondary" onclick="showView('quick')" style="display:none">חזרה מהירה</button><button class="btn ghost" onclick="showView('summary')">📘 להתחיל מסיכומים</button><button class="btn secondary" onclick="showView('audio')">🎧 האזנה מהירה</button></div></header>
  <div class="grid three"><div class="metric"><div class="num">${DATA.topics.length}</div><div class="label">נושאים</div></div><div class="metric"><div class="num">${DATA.closedQuestions.length+DATA.openQuestions.length}</div><div class="label">שאלות תרגול</div></div><div class="metric"><div class="num">${completionPct()}%</div><div class="label">התקדמות כללית</div></div></div>
  <div class="card"><h2>מסלול למידה מומלץ</h2><div class="quickStrip"><button class="big" onclick="showView('summary')">1 · לקרוא סיכום<small>הבנה לפי נושאים</small></button><button class="big" onclick="showView('cards')">2 · כרטיסיות<small>שינון מהיר</small></button><button class="big" onclick="showView('practice')">3 · תרגול<small>משוב מיידי</small></button><button class="big" onclick="showView('open')">4 · פתוחות<small>ניסוח תשובה מלאה</small></button><button class="big" onclick="showView('audio')">🎧 האזנה<small>חזרה קולית</small></button><button class="big" onclick="startExam();showView('exam')">5 · מבחן<small>סימולציה אקראית</small></button></div></div>
  <div class="grid two"><div class="card"><h2>דף זהב מהיר</h2><div class="miniList">${DATA.gold.slice(0,5).map(x=>`<div class="miniItem">${esc(x)}</div>`).join('')}</div><button class="btn ghost full" onclick="showView('tables')">לכל דף הזהב והטבלאות</button></div><div class="card"><h2>לחזרה עכשיו</h2>${weakNames.length?`<p>אלו הנושאים שמופיעים כנושאים חלשים:</p><div class="weak">${weakNames.map(t=>`<span class="tag orange">${t.icon} ${esc(t.title)}</span>`).join('')}</div><button class="btn secondary full" onclick="startMistakePractice()">תרגול טעויות</button>`:`<div class="callout">אין כרגע נושאים חלשים מסומנים. אפשר להתחיל מכרטיסיות או מבחן קצר.</div><button class="btn primary full" onclick="showView('cards')">לעבור לכרטיסיות</button>`}</div></div>`;}
function continueLearning(){showView(state.view && state.view!=='home'?state.view:'summary')}
function renderSummaries(){document.getElementById('summary').innerHTML=`<div class="card">${sectionHead('📘','סיכומים מורחבים','כל נושא כולל הסבר קצר, הרחבה, משפט למבחן, מילות חובה ומה לקחת מזה.')}<div class="searchWrap"><input class="search" id="summarySearch" placeholder="חיפוש בתוך הסיכומים..." oninput="drawSummaries()"><select id="summaryTopic" onchange="drawSummaries()"><option value="">כל הנושאים</option>${DATA.topics.map(t=>`<option value="${t.id}">${t.icon} ${esc(t.title)}</option>`).join('')}</select></div></div><div id="summaries" class="grid two"></div>`;drawSummaries();}
function drawSummaries(){const q=(document.getElementById('summarySearch')?.value||'').toLowerCase().trim();const tid=document.getElementById('summaryTopic')?.value||'';const list=DATA.topics.filter(t=>(!tid||t.id===tid)&&(!q||JSON.stringify(t).toLowerCase().includes(q)));document.getElementById('summaries').innerHTML=list.map(t=>`<article class="card topicCard"><div class="badges"><span class="badge">${t.icon} ${esc(t.title)}</span><button class="btn ghost" style="min-height:34px;padding:6px 10px" onclick="toggleTopicDone('${t.id}')">${state.weak[t.id]?'להסיר מחזרה':'סמן לחזרה'}</button></div><p><b>בקצרה:</b> ${esc(t.short)}</p><details open><summary>הרחבה</summary><ul>${(t.extended||[]).map(x=>`<li>${esc(x)}</li>`).join('')}</ul></details>${t.clauses?`<details><summary>תנאים / סעיפים</summary><ul>${t.clauses.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></details>`:''}${t.chain?`<details><summary>שרשרת סיבה ותוצאה</summary><div class="chips">${t.chain.map(x=>`<span class="tag">${esc(x)}</span>`).join('')}</div></details>`:''}<div class="model"><b>משפט למבחן:</b> ${esc(t.exam)}</div><div class="tags">${(t.keywords||[]).map(k=>`<span class="tag">${esc(k)}</span>`).join('')}</div><div class="callout"><b>מה לקחת מזה:</b> ${esc(t.take)}</div></article>`).join('')||'<div class="card empty">לא נמצאו תוצאות.</div>';}
function toggleTopicDone(id){if(state.weak[id])delete state.weak[id];else state.weak[id]=true;save();drawSummaries();renderHome();toast(state.weak[id]?'סומן לחזרה':'הוסר מהחזרה')}
function renderTables(){document.getElementById('tables').innerHTML=`<div class="card">${sectionHead('📊','טבלאות, ציר זמן ודף זהב','השוואות, ציר זמן וחזרה מרוכזת לפני מבחן.')}</div><div class="card"><h2>ציר זמן בסיסי</h2><div class="timeline">${DATA.timeline.map(x=>`<div class="timeitem"><div class="year">${esc(x[0])}</div><div><b>${esc(x[1])}</b><p>${esc(x[2])}</p></div></div>`).join('')}</div></div>${DATA.tables.map(tbl=>`<div class="card"><h2>${esc(tbl.title)}</h2><div class="tableScroll"><table><thead><tr>${tbl.headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${tbl.rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`).join('')}<div class="card"><h2>דף זהב לחזרה מהירה</h2><div class="grid two">${DATA.gold.map((x,i)=>`<div class="miniItem"><b>${i+1}.</b> ${esc(x)}</div>`).join('')}</div></div>`;}
function renderCards(){document.getElementById('cards').innerHTML=`<div class="card">${sectionHead('🧠','כרטיסיות לימוד','לחיצה הופכת כרטיסייה. סמני ידעתי / צריך שוב כדי לבנות חזרה חכמה.',`<span class="pill" id="cardCount"></span>`)}<div class="toolbar"><button class="btn ghost" onclick="filterCards('all')">הכול</button><button class="btn secondary" onclick="filterCards('again')">צריך שוב</button><button class="btn ghost" onclick="shuffleCards()">ערבוב</button></div></div><div class="flash"><div class="flashbox" onclick="flipCard()"><div><span class="pill" id="cardTopic"></span><div class="flashq" id="cardQ"></div></div><div id="cardA" class="flasha hidden"></div><div class="callout" id="cardTip">לחצי כדי להפוך</div></div><div class="btns" style="justify-content:center"><button class="btn ghost" onclick="prevCard(event)">הקודמת</button><button class="btn primary" onclick="markCard(event,'known')">ידעתי</button><button class="btn secondary" onclick="markCard(event,'again')">צריך שוב</button><button class="btn ghost" onclick="nextCard(event)">הבאה</button></div></div>`;drawCard();}
let cardFlipped=false,cardOrder=null,cardFilter='all';function getCardList(){let arr=cardOrder||DATA.cards.map((_,i)=>i);if(cardFilter==='again')arr=arr.filter(i=>state.cards.again[i]);return arr.length?arr:DATA.cards.map((_,i)=>i)}
function drawCard(){const list=getCardList();state.cards.index=clamp(+(state.cards.index||0),0,list.length-1);const real=list[state.cards.index];const c=DATA.cards[real];cardFlipped=false;document.getElementById('cardCount').textContent=`${state.cards.index+1}/${list.length}`;document.getElementById('cardTopic').textContent=c[1];document.getElementById('cardQ').textContent=c[2];const a=document.getElementById('cardA');a.classList.add('hidden');a.innerHTML=`<p>${esc(c[3])}</p><div class="callout">${esc(c[4])}</div>`;document.getElementById('cardTip').textContent=state.cards.known[real]?'כבר סומן: ידעתי':'לחצי כדי להפוך';save();updateProgressMini();}
function flipCard(){cardFlipped=!cardFlipped;document.getElementById('cardA').classList.toggle('hidden',!cardFlipped);document.getElementById('cardTip').textContent=cardFlipped?'לחצי שוב כדי להסתיר':'לחצי כדי להפוך'}
function nextCard(e){e?.stopPropagation();const list=getCardList();state.cards.index=(+(state.cards.index||0)+1)%list.length;drawCard()}function prevCard(e){e?.stopPropagation();const list=getCardList();state.cards.index=(+(state.cards.index||0)-1+list.length)%list.length;drawCard()}function markCard(e,type){e?.stopPropagation();const real=getCardList()[state.cards.index];if(type==='known'){state.cards.known[real]=true;delete state.cards.again[real];toast('נשמר: ידעתי')}else{state.cards.again[real]=true;state.weak[DATA.cards[real][0]]=true;toast('נשמר לחזרה נוספת')}save();nextCard(e)}function filterCards(f){cardFilter=f;state.cards.index=0;drawCard()}function shuffleCards(){cardOrder=DATA.cards.map((_,i)=>i).sort(()=>Math.random()-.5);state.cards.index=0;drawCard();toast('הכרטיסיות עורבבו')}
function renderPractice(){document.getElementById('practice').innerHTML=`<div class="card">${sectionHead('✍️','תרגול שאלות קצרות','אמריקאיות, נכון/לא נכון והשלמות עם משוב מיידי.',`<span class="pill" id="pracCount"></span>`)}<div class="toolbar"><button class="btn ghost" onclick="setPracticeMode('all')">כל השאלות</button><button class="btn secondary" onclick="startMistakePractice()">תרגול טעויות</button><button class="btn ghost" onclick="randomPractice()">אקראית</button></div></div><div class="card"><div><span class="pill" id="pracType"></span> <span class="pill" id="pracTopic"></span></div><h3 id="pracQ" style="margin-top:12px"></h3><div id="pracArea"></div><div id="pracFeedback" class="feedback"></div></div><div class="btns"><button class="btn ghost" onclick="prevPractice()">הקודמת</button><button class="btn ghost" onclick="nextPractice()">הבאה</button></div>`;drawPractice();}
function practiceList(){if(state.practice.mode==='wrong'&&state.practice.wrong.length){const ids=new Set(state.practice.wrong.map(w=>w.index));return DATA.closedQuestions.map((q,i)=>[q,i]).filter(x=>ids.has(x[1]));}return DATA.closedQuestions.map((q,i)=>[q,i]);}
function drawPractice(){const list=practiceList();state.practice.index=clamp(+state.practice.index||0,0,list.length-1);const [q,real]=list[state.practice.index];document.getElementById('pracCount').textContent=`${state.practice.index+1}/${list.length}`;document.getElementById('pracType').textContent=q.type==='mc'?'אמריקאית':q.type==='tf'?'נכון / לא נכון':'השלמה';document.getElementById('pracTopic').textContent=q.topic;document.getElementById('pracQ').textContent=q.q;document.getElementById('pracFeedback').className='feedback';let html='';if(q.type==='mc')html=q.opts.map((o,i)=>`<button class="answer" onclick="checkPractice(${real},${i},this)">${esc(o)}</button>`).join('');if(q.type==='tf')html=`<button class="answer" onclick="checkPractice(${real},true,this)">נכון</button><button class="answer" onclick="checkPractice(${real},false,this)">לא נכון</button>`;if(q.type==='fill')html=`<div class="soft">${esc(q.q).replace(/____/g,'<input class="fill" aria-label="תשובה חסרה">')}</div><button class="btn primary" onclick="checkFill(${real})">בדיקה</button>`;document.getElementById('pracArea').innerHTML=html;save();}
function checkPractice(real,ans,el){const q=DATA.closedQuestions[real];const correct=ans===q.a;document.querySelectorAll('#pracArea .answer').forEach(b=>b.disabled=true);el.classList.add(correct?'correct':'wrong');if(!correct){document.querySelectorAll('#pracArea .answer').forEach((b,i)=>{if((q.type==='mc'&&i===q.a)||(q.type==='tf'&&((i===0&&q.a===true)||(i===1&&q.a===false))))b.classList.add('correct')});markWrong(real,q.id)}recordPractice(q.id,correct);feedback(correct,q.ex,q.tip);}
function checkFill(real){const q=DATA.closedQuestions[real];const vals=[...document.querySelectorAll('#pracArea input')].map(i=>i.value.trim());const correct=(q.bl||[]).every((b,i)=>vals[i]===b);document.querySelectorAll('#pracArea input').forEach((inp,i)=>inp.style.borderColor=vals[i]===(q.bl||[])[i]?'var(--good)':'var(--bad)');if(!correct)markWrong(real,q.id);recordPractice(q.id,correct);feedback(correct,q.ex,q.tip);}
function feedback(ok,ex,tip){const f=document.getElementById('pracFeedback');f.className='feedback show '+(ok?'good':'bad');f.innerHTML=`<b>${ok?'נכון מאוד':'כמעט — לתקן ולזכור'}</b><p>${esc(ex)}</p><div><b>טיפ:</b> ${esc(tip)}</div>`;}
function recordPractice(id,ok){state.practice.ans++;if(ok)state.practice.ok++;state.practice.by[id]=state.practice.by[id]||{ok:0,total:0};state.practice.by[id].total++;if(ok)state.practice.by[id].ok++;if(!ok)state.weak[id]=true;save();updateProgressMini();}
function markWrong(index,id){if(!state.practice.wrong.some(w=>w.index===index))state.practice.wrong.push({index,id,time:Date.now()});}
function setPracticeMode(m){state.practice.mode=m;state.practice.index=0;drawPractice()}function startMistakePractice(){if(!state.practice.wrong.length){toast('אין עדיין טעויות שמורות לתרגול');showView('practice');return}state.practice.mode='wrong';state.practice.index=0;showView('practice');drawPractice()}function nextPractice(){const list=practiceList();state.practice.index=(state.practice.index+1)%list.length;drawPractice()}function prevPractice(){const list=practiceList();state.practice.index=(state.practice.index-1+list.length)%list.length;drawPractice()}function randomPractice(){const list=practiceList();state.practice.index=Math.floor(Math.random()*list.length);drawPractice()}
function renderOpen(){document.getElementById('open').innerHTML=`<div class="card">${sectionHead('📝','שאלות פתוחות עם צ׳ק־ליסט','כתיבה במילים שלך ואז בדיקה עצמית לפי היגדים.',`<span class="pill" id="openCount"></span>`)}</div><div class="card"><span class="pill" id="openTopic"></span><h3 id="openQ" style="margin-top:12px"></h3><div class="model"><b>תבנית:</b> הגורם / העיקרון הוא ___ . משמעותו היא ___ . הוא השפיע בכך ש־___ . לכן ניתן לראות ש־___.</div><textarea id="openText" placeholder="כתבי כאן תשובה מלאה במילים שלך..." oninput="saveOpenDraft()"></textarea><div class="btns"><button class="btn primary" onclick="showOpenChecklist()">סיימתי — פתחי צ׳ק־ליסט</button><button class="btn ghost" onclick="clearOpen()">ניקוי</button></div><div id="openChecklist"></div><div id="openFeedback" class="feedback"></div></div><div class="btns"><button class="btn ghost" onclick="prevOpen()">הקודמת</button><button class="btn secondary" onclick="randomOpen()">אקראית</button><button class="btn ghost" onclick="nextOpen()">הבאה</button></div>`;drawOpen();}
function drawOpen(){state.open.index=clamp(+state.open.index||0,0,DATA.openQuestions.length-1);const q=DATA.openQuestions[state.open.index];document.getElementById('openCount').textContent=`${state.open.index+1}/${DATA.openQuestions.length}`;document.getElementById('openTopic').textContent=q.topic;document.getElementById('openQ').textContent=q.q;document.getElementById('openText').value=state.open.drafts[state.open.index]||'';document.getElementById('openChecklist').innerHTML='';document.getElementById('openFeedback').className='feedback';save();}
function saveOpenDraft(){state.open.drafts[state.open.index]=document.getElementById('openText').value;save()}
function showOpenChecklist(){const q=DATA.openQuestions[state.open.index];document.getElementById('openChecklist').innerHTML=`<h3>צ׳ק־ליסט בדיקה</h3>${q.checks.map((c,i)=>`<label class="checkitem"><input type="checkbox" onchange="updateOpenScore()"> <span>${esc(c)}</span></label>`).join('')}<details open><summary>תשובה לדוגמה</summary><div class="model">${esc(q.model)}</div></details>`;updateOpenScore();}
function updateOpenScore(){const boxes=[...document.querySelectorAll('#openChecklist input')];if(!boxes.length)return;boxes.forEach(b=>b.closest('.checkitem').classList.toggle('checked',b.checked));const ok=boxes.filter(b=>b.checked).length;const total=boxes.length;const q=DATA.openQuestions[state.open.index];state.open.checked+=ok;state.open.totalChecks+=total;state.open.answered++;state.open.by[q.id]=state.open.by[q.id]||{ok:0,total:0};state.open.by[q.id].ok+=ok;state.open.by[q.id].total+=total;if(ok<Math.ceil(total*.7))state.weak[q.id]=true;save();const f=document.getElementById('openFeedback');f.className='feedback show '+(ok/total>.75?'good':ok/total>.45?'mid':'bad');f.innerHTML=`<b>כיסוי תשובה: ${ok}/${total}</b><p>${ok===total?'מעולה. התשובה כוללת את כל הרכיבים.':'כדאי להשלים את הסעיפים שלא סומנו לפני מבחן.'}</p>`;}
function clearOpen(){document.getElementById('openText').value='';delete state.open.drafts[state.open.index];save()}function nextOpen(){state.open.index=(state.open.index+1)%DATA.openQuestions.length;drawOpen()}function prevOpen(){state.open.index=(state.open.index-1+DATA.openQuestions.length)%DATA.openQuestions.length;drawOpen()}function randomOpen(){state.open.index=Math.floor(Math.random()*DATA.openQuestions.length);drawOpen()}
function renderSources(){document.getElementById('sources').innerHTML=`<div class="card">${sectionHead('🔎','שאלות מקור','מקורות מעובדים בסגנון מבחן + שאלות + צ׳ק־ליסט + תשובה לדוגמה.')}</div>${DATA.sources.map((s,i)=>`<div class="card sectionCard"><span class="pill">מקור ${i+1}</span><h2>${esc(s.title)}</h2><div class="model">${esc(s.source)}</div><h3>שאלות</h3><ol>${s.questions.map(q=>`<li>${esc(q)}</li>`).join('')}</ol><details><summary>צ׳ק־ליסט</summary><ul>${s.checks.map(c=>`<li>${esc(c)}</li>`).join('')}</ul></details><details><summary>תשובה לדוגמה</summary><div class="callout">${esc(s.model)}</div></details></div>`).join('')}`;}
function startExam(){const pool=DATA.closedQuestions.map((_,i)=>i).sort(()=>Math.random()-.5).slice(0,10);state.exam.set=pool;document.getElementById('examResults')?.remove();save();drawExam();toast('נוצר מבחן אקראי חדש')}
function renderExam(){document.getElementById('exam').innerHTML=`<div class="card">${sectionHead('🎯','סימולציית מבחן','10 שאלות אקראיות. בסיום: ציון, טעויות והמלצות חזרה.')}<div class="btns"><button class="btn primary" onclick="startExam()">מבחן חדש</button><button class="btn secondary" onclick="gradeExam()">בדיקה וסיום</button></div></div><div id="examBox"></div><div id="examResults" class="card hidden"></div>`;if(!state.exam.set.length)startExam();else drawExam();}
function drawExam(){const box=document.getElementById('examBox');if(!box)return;box.innerHTML=state.exam.set.map((idx,n)=>{const q=DATA.closedQuestions[idx];let body='';if(q.type==='mc')body=q.opts.map((o,i)=>`<label class="answer"><input type="radio" name="ex${n}" value="${i}"> ${esc(o)}</label>`).join('');else if(q.type==='tf')body=`<label class="answer"><input type="radio" name="ex${n}" value="true"> נכון</label><label class="answer"><input type="radio" name="ex${n}" value="false"> לא נכון</label>`;else body=`<div class="soft">${esc(q.q).replace(/____/g,'<input class="fill" data-ex="'+n+'">')}</div>`;return `<div class="examq"><span class="pill">${n+1}. ${esc(q.topic)}</span><h3>${esc(q.q)}</h3>${body}</div>`}).join('');}
function gradeExam(){if(!state.exam.set.length)return startExam();let ok=0,wrong=[],right=[];state.exam.set.forEach((idx,n)=>{const q=DATA.closedQuestions[idx];let is=false;if(q.type==='mc'||q.type==='tf'){const checked=document.querySelector(`input[name="ex${n}"]:checked`);if(checked){let val=q.type==='mc'?+checked.value:checked.value==='true';is=val===q.a}}else{const vals=[...document.querySelectorAll(`input[data-ex="${n}"]`)].map(i=>i.value.trim());is=(q.bl||[]).every((b,i)=>vals[i]===b)}if(is){ok++;right.push(n+1)}else{wrong.push({n:n+1,q,idx});state.weak[q.id]=true;markWrong(idx,q.id)}});const score=Math.round(ok/state.exam.set.length*100);state.exam.last=score;state.exam.history.push(score);save();let weak=[...new Set(wrong.map(w=>w.q.topic))].join(', ');const res=document.getElementById('examResults');res.classList.remove('hidden');res.innerHTML=`<div class="score" style="--deg:${score*3.6}deg"><span>${score}</span></div><h2 style="text-align:center">ציון: ${score}</h2><p style="text-align:center"><b>${ok}</b> תשובות נכונות מתוך <b>${state.exam.set.length}</b>.</p><div class="grid two"><div class="card"><h3>שאלות נכונות</h3><p>${right.length?right.join(', '):'אין'}</p></div><div class="card"><h3>שאלות לחזרה</h3><p>${wrong.length?wrong.map(w=>w.n).join(', '):'אין טעויות'}</p></div></div><div class="examtip"><b>המלצה:</b> ${weak?`חזרי על: <b>${esc(weak)}</b>. לאחר מכן עשי שאלה פתוחה עם צ׳ק־ליסט.`:'כל הכבוד. עכשיו כדאי לתרגל שאלה פתוחה אחת לניסוח מלא.'}</div><h3>תיקון טעויות</h3>${wrong.length?wrong.map(w=>`<div class="examq"><b>שאלה ${w.n}:</b> ${esc(w.q.q)}<p><b>הסבר:</b> ${esc(w.q.ex)}</p><p><b>טיפ:</b> ${esc(w.q.tip)}</p></div>`).join(''):'אין טעויות לתקן.'}`;res.scrollIntoView({behavior:'smooth'});renderHome();}
function renderBank(){document.getElementById('bank').innerHTML=`<div class="card">${sectionHead('📋','מאגר שאלות מלא','שאלות קצרות, הסבר, השוואה, עומק ושאלות מומלצות לתרגול.')}</div>${Object.entries(DATA.questionBank).map(([title,items])=>`<div class="card"><h2>${esc(title)}</h2><ol>${items.map(x=>`<li>${esc(x)}</li>`).join('')}</ol></div>`).join('')}`;}
function renderGlossary(){document.getElementById('glossary').innerHTML=`<div class="card">${sectionHead('📚','מילון מושגים','חיפוש מהיר במושגים ובמשפטי שימוש לתשובה.')}<input class="search" id="glossSearch" placeholder="חיפוש מושג..." oninput="drawGlossary()"></div><div id="glossaryWrap" class="grid two"></div>`;drawGlossary();}
function drawGlossary(){const q=(document.getElementById('glossSearch')?.value||'').toLowerCase().trim();const list=DATA.glossary.filter(g=>!q||g.join(' ').toLowerCase().includes(q));document.getElementById('glossaryWrap').innerHTML=list.map(g=>`<div class="card topicCard" style="border-right-color:var(--a)"><h3>${esc(g[0])}</h3><p>${esc(g[1])}</p><div class="examtip"><b>שימוש בתשובה:</b> ${esc(g[2])}</div></div>`).join('')||'<div class="card empty">לא נמצאו מושגים.</div>';}

function audioState(){state.audio=state.audio||{listened:{},last:null,progress:{}};state.audio.listened=state.audio.listened||{};state.audio.progress=state.audio.progress||{};return state.audio;}
function formatAudioTime(sec){sec=Math.max(0,Math.floor(+sec||0));const m=Math.floor(sec/60),s=String(sec%60).padStart(2,'0');return `${m}:${s}`;}
function renderAudio(){
  const a=audioState();
  document.getElementById('audio').innerHTML=`
  <div class="card">${sectionHead('🎧','האזנה וחזרה קולית','שני קטעי קול ללמידה בלי לקרוא. האודיו מנוגן מהאתר כדי לא להכביד על התקנת ה־PWA.')}</div>
  <div class="grid two">
    ${AUDIO_ITEMS.map((it,idx)=>{
      const done=!!a.listened[it.id];
      const prog=a.progress[it.id]||0;
      return `<div class="card topicCard audioCard" style="border-right-color:var(--a)">
        <div class="badges"><span class="badge orange">קטע ${idx+1}</span><span class="badge">${esc(it.duration)}</span>${done?'<span class="badge audioDone">הושלם</span>':''}</div>
        <h2>${esc(it.title)}</h2>
        <p>${esc(it.desc)}</p>
        <audio controls preload="metadata"
          onloadedmetadata="resumeAudio('${it.id}',this)"
          onplay="audioEvent('${it.id}','play',this)"
          onpause="audioEvent('${it.id}','pause',this)"
          ontimeupdate="audioEvent('${it.id}','time',this)"
          onended="audioEvent('${it.id}','ended',this)">
          <source src="${esc(it.file)}" type="audio/mp4">
          הדפדפן לא תומך בניגון אודיו.
        </audio>
        <div class="audioMeta">
          <span class="tag">נקודת האזנה: ${prog?formatAudioTime(prog):'עדיין לא'}</span>
          <button class="btn ghost" onclick="markAudioDone('${it.id}')">סמני כהאזנתי</button>
        </div>
      </div>`
    }).join('')}
  </div>
  <div class="card">
    <h2>איך להשתמש בהאזנה?</h2>
    <ul>
      <li>להאזין פעם אחת ברצף כדי להבין את הסיפור ההיסטורי.</li>
      <li>אחר כך לעבור לסיכומים ולענות על שאלות פתוחות.</li>
      <li>אם נועה עייפה מקריאה — זה מסך מצוין לחזרה לפני מבחן.</li>
    </ul>
    <div class="callout">שימי לב: קבצי האודיו אינם נשמרים מראש לאופליין כדי שההתקנה בטלפון לא תהיה כבדה. האפליקציה עצמה עדיין נשמרת כ־PWA.</div>
  </div>`;
}
function audioEvent(id,type,el){
  const a=audioState();
  a.last=id;
  if(el&&isFinite(el.currentTime)){
    a.progress[id]=Math.floor(el.currentTime||0);
  }
  if(type==='ended'){
    a.listened[id]=Date.now();
    a.progress[id]=0;
    toast('הקטע סומן כהושלם');
  }
  if(type==='time'){
    const now=Date.now();
    if(audioEvent._last && now-audioEvent._last<10000)return;
    audioEvent._last=now;
  }
  save();
}
function resumeAudio(id,el){
  try{
    const a=audioState();
    const p=+(a.progress[id]||0);
    if(p>3 && el.duration && p<el.duration-20)el.currentTime=p;
  }catch(e){}
}
function markAudioDone(id){
  const a=audioState();
  a.listened[id]=Date.now();
  a.progress[id]=0;
  save();
  renderAudio();
  toast('סומן כהאזנה מלאה');
}

function renderProgress(){const known=Object.keys(state.cards.known||{}).length;const p=state.practice.ans?Math.round(state.practice.ok/state.practice.ans*100):0;const op=state.open.totalChecks?Math.round(state.open.checked/state.open.totalChecks*100):0;const last=state.exam.last??'—';const weakIds=new Set([...Object.keys(state.weak||{}),...Object.keys(state.cards.again||{}).map(i=>DATA.cards[+i]?.[0]).filter(Boolean)]);const weak=[...weakIds].map(topicById).filter(Boolean);document.getElementById('progress').innerHTML=`<div class="card">${sectionHead('📈','התקדמות','ההתקדמות נשמרת בדפדפן באמצעות localStorage.')}</div><div class="grid four"><div class="metric"><div class="num">${known}/${DATA.cards.length}</div><div class="label">כרטיסיות שנלמדו</div></div><div class="metric"><div class="num">${p}%</div><div class="label">הצלחה בתרגול</div></div><div class="metric"><div class="num">${op}%</div><div class="label">כיסוי בשאלות פתוחות</div></div><div class="metric"><div class="num">${last}</div><div class="label">ציון מבחן אחרון</div></div></div><div class="grid two" style="margin-top:14px"><div class="card"><h2>הצלחה לפי נושאים</h2>${DATA.topics.map(t=>{const a=state.practice.by[t.id]||{ok:0,total:0},b=state.open.by[t.id]||{ok:0,total:0},ok=a.ok+b.ok,total=a.total+b.total,pct=total?Math.round(ok/total*100):0;return `<div class="barrow"><span>${t.icon} ${esc(t.title)}</span><div class="bar"><span style="width:${pct}%"></span></div><b>${total?pct+'%':'—'}</b></div>`}).join('')}</div><div class="card"><h2>נושאים לחזרה</h2><div class="weak">${weak.length?weak.map(t=>`<span class="tag orange">${t.icon} ${esc(t.title)}</span>`).join(''):'<span class="tag good">אין נושאים חלשים מסומנים</span>'}</div><div class="btns"><button class="btn secondary" onclick="startMistakePractice()">תרגול טעויות</button><button class="btn danger" onclick="resetAll()">איפוס הכל</button></div></div></div>`;updateProgressMini();}
function renderSettings(){document.getElementById('settings').innerHTML=`<div class="card">${sectionHead('⚙️','הגדרות','התקנה, גודל טקסט ואיפוס התקדמות.')}</div><div class="grid two"><div class="card"><h2>התקנה בטלפון</h2><p>אפשר להתקין למסך הבית בדפדפן תומך. ב־Android בדרך כלל דרך “Add to Home screen”. ב־iPhone דרך Share ואז “Add to Home Screen”.</p><button class="btn primary" onclick="promptInstall()">נסה התקנה</button></div><div class="card"><h2>קריאות</h2><div class="btns"><button class="btn ghost" onclick="setFont('normal')">רגיל</button><button class="btn ghost" onclick="setFont('large')">גדול</button></div></div><div class="card"><h2>נתונים</h2><p>שמירת ההתקדמות מתבצעת מקומית בדפדפן הזה בלבד.</p><button class="btn danger" onclick="resetAll()">איפוס התקדמות</button></div><div class="card"><h2>מצב עבודה ללא אינטרנט</h2><p>כאשר הקבצים מועלים יחד לאתר ומופעל ה־service worker, האפליקציה תישמר במטמון לעבודה בסיסית ללא אינטרנט.</p></div></div>`;}
function setFont(size){state.ui.font=size;save();applyUi()}function applyUi(){document.documentElement.style.fontSize=state?.ui?.font==='large'?'18px':'16px'}function resetAll(){if(!confirm('לאפס את כל ההתקדמות?'))return;storageRemove(KEY);state=defaultState();save();renderAll();showView('home');toast('ההתקדמות אופסה')}
function renderAll(){renderHome();renderSummaries();renderTables();renderCards();renderPractice();renderOpen();renderAudio();renderSources();renderExam();renderBank();renderGlossary();renderProgress();renderSettings();updateProgressMini();}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('installBtn').style.display='inline-flex'});function promptInstall(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null}else toast('אם הכפתור לא נפתח — התקיני דרך תפריט הדפדפן')}
document.getElementById('installBtn').addEventListener('click',promptInstall);
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js').catch(()=>{}));}
function init(){renderNav();load();renderAll();showView(state.view||'home');}
init();
</script>
</body>
